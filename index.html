<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末世文游编辑器</title>
<style>
:root{
  --bg:#12121a;--s1:#1a1a24;--s2:#22222e;--s3:#2a2a38;
  --b1:#30303e;--b2:#42424e;
  --t1:#d4d0c8;--t2:#8a8880;--t3:#555560;
  --acc:#c8913f;--acc2:#7fba5c;--danger:#e05555;--info:#5599cc;--purple:#9955cc;
  --mono:'Courier New',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:46px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.tb-title{font-family:var(--mono);font-size:12px;color:var(--acc);letter-spacing:3px}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-game{font-size:13px;color:var(--t2)}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:172px;background:var(--s1);border-right:1px solid var(--b1);padding:10px 0;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:24px 28px}
.nav-lbl{font-size:10px;color:var(--t3);padding:8px 16px 3px;letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--t2);border-left:2px solid transparent;font-size:13px;user-select:none;transition:all .12s}
.nav-item:hover{color:var(--t1);background:var(--s2)}
.nav-item.active{color:var(--acc);border-left-color:var(--acc);background:rgba(200,145,63,.08)}
.btn{padding:6px 14px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;border-radius:3px;font-size:13px;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#12121a;font-weight:700}
.btn.pri:hover{background:#d8a050;border-color:#d8a050;color:#12121a}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:2px 7px;font-size:11px}
.btn.del{border-color:transparent;color:var(--t3)}
.btn.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(224,85,85,.1)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--s2);border-color:var(--b1);color:var(--t1)}
input[type=text],input[type=number],textarea,select{background:var(--bg);border:1px solid var(--b1);color:var(--t1);padding:6px 10px;border-radius:3px;font-size:13px;font-family:inherit;outline:none;transition:border-color .12s}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
input:disabled,select:disabled{opacity:.45;cursor:not-allowed}
textarea{resize:vertical;min-height:72px;line-height:1.65;width:100%}
select option{background:var(--s2)}
input[type=number]{width:80px}
input[type=color]{padding:2px 4px;height:32px;width:44px;cursor:pointer}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fr:last-child{margin-bottom:0}
.fl{color:var(--t2);font-size:12px;white-space:nowrap;min-width:52px}
.fr input,.fr select{flex:1}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:4px;margin-bottom:14px}
.card-h{padding:11px 16px;border-bottom:1px solid var(--b1);font-size:11px;color:var(--acc);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.card-b{padding:16px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pt{font-size:20px;font-weight:600}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.pa{display:flex;gap:8px;align-items:center}
.li{display:flex;align-items:center;padding:10px 14px;border:1px solid var(--b1);border-radius:3px;margin-bottom:6px;background:var(--s2);gap:10px}
.li:hover{border-color:var(--b2)}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px}
.li-id{font-size:11px;color:var(--t3);font-family:var(--mono)}
.li-sub{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-act{display:flex;gap:6px;flex-shrink:0}
.ep{border:1px solid var(--acc);border-radius:3px;padding:16px;margin-bottom:10px;background:var(--bg)}
.ep-t{font-size:12px;color:var(--acc);font-family:var(--mono);margin-bottom:13px}
.tg{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:3px 11px;border:1px solid var(--b2);border-radius:12px;font-size:12px;cursor:pointer;color:var(--t2);user-select:none;transition:all .12s}
.tag:hover{border-color:var(--acc);color:var(--t1)}
.tag.on{border-color:var(--acc);background:rgba(200,145,63,.15);color:var(--acc)}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:7px 10px;color:var(--t3);font-size:11px;font-weight:400;border-bottom:1px solid var(--b1)}
.st td{padding:7px 10px;border-bottom:1px solid var(--b1);vertical-align:middle}
.st tr:last-child td{border-bottom:none}
.st input{width:70px}.st input.nm{width:90px}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:13px;color:var(--t2)}
.bcl{color:var(--acc);cursor:pointer}.bcl:hover{text-decoration:underline}
.bcs{color:var(--t3)}
.lc{border:1px solid var(--b1);border-radius:4px;padding:14px 16px;margin-bottom:10px;background:var(--s2);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.lc:hover{border-color:var(--acc);background:var(--s3)}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;font-family:var(--mono)}
.b-daily{background:rgba(127,186,92,.15);color:var(--acc2);border:1px solid rgba(127,186,92,.3)}
.b-mainline{background:rgba(200,145,63,.15);color:var(--acc);border:1px solid rgba(200,145,63,.3)}
.b-storyline{background:rgba(153,85,204,.15);color:var(--purple);border:1px solid rgba(153,85,204,.3)}
.sec{font-size:11px;color:var(--acc);font-family:var(--mono);letter-spacing:.5px;margin:13px 0 7px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--b1)}
.pb{border:1px solid var(--b1);border-radius:3px;margin-bottom:8px;overflow:hidden}
.pb-h{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--s2);border-bottom:1px solid var(--b1);flex-wrap:wrap}
.pb-h select{padding:3px 6px;font-size:12px}
.pb-b{padding:10px}
.cb{border:1px solid var(--b1);border-radius:3px;margin-bottom:8px}
.cb-h{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);cursor:pointer}
.cb-h:hover{background:var(--s3)}
.cb-num{font-size:11px;color:var(--t3);font-family:var(--mono);min-width:22px}
.cb-prev{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.cb-b{padding:12px 14px;border-top:1px solid var(--b1);display:none}
.cb-b.open{display:block}
.cr,.er{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.cr select,.er select{padding:4px 6px;font-size:12px}
.cr input,.er input{padding:4px 6px;font-size:12px;width:72px}
.ar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-ic{font-size:32px;margin-bottom:10px}
.grp-box{border:1px solid var(--b1);border-radius:3px;padding:10px;margin-bottom:8px;background:var(--bg)}
.grp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.grp-label{font-size:11px;color:var(--acc2);font-family:var(--mono)}
.info-box{background:rgba(200,145,63,.07);border:1px solid rgba(200,145,63,.2);border-radius:3px;padding:9px 13px;font-size:12px;color:var(--t2);margin-bottom:14px}
/* 段落样式色点 */
.swatch{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;flex-shrink:0}
/* 字号预览 */
.sz-btns{display:flex;gap:3px}
.sz-btn{padding:2px 7px;font-size:11px;border:1px solid var(--b2);border-radius:2px;cursor:pointer;background:var(--s2);color:var(--t2)}
.sz-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(200,145,63,.12)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--acc2);color:var(--acc2);padding:9px 16px;border-radius:4px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}
#toast.err{border-color:var(--danger);color:var(--danger)}
#toast.info{border-color:var(--acc);color:var(--acc)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}
</style>
</head>
<body>
<div id="topbar">
  <div class="tb-title">▸ WASTELAND · STORY EDITOR</div>
  <div class="tb-right">
    <span class="tb-game" id="tb-gname">末世纪元</span>
    <button class="btn sm" onclick="importClick()">⬆ 导入</button>
    <button class="btn sm pri" onclick="exportJSON()">⬇ 导出 JSON</button>
  </div>
</div>
<div id="body"><div id="sidebar"></div><div id="main"></div></div>
<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileImport(event)">

<script>
// ─── 段落样式预设 ───────────────────────────
const STYLES = {
  normal:   {label:'正常叙述',   color:'#d4d0c8', size:'md'},
  emphasis: {label:'重点强调',   color:'#ffffff',  size:'lg'},
  whisper:  {label:'低沉淡出',   color:'#666660',  size:'sm'},
  warning:  {label:'警告紧张',   color:'#e05555',  size:'md'},
  inner:    {label:'内心独白',   color:'#9988bb',  size:'md'},
  title:    {label:'章节标题',   color:'#c8913f',  size:'xl'},
  system:   {label:'系统提示',   color:'#5599cc',  size:'sm'},
};
const SIZES = {sm:'小',md:'中',lg:'大',xl:'特大'};

// ─── 初始数据 ────────────────────────────────
let S = {
  meta:{title:'末世纪元',version:'0.1'},
  settings:{
    timePeriods:['清晨','上午','下午','傍晚','夜晚','深夜'],
    stats:[
      {id:'hp',   name:'体力', initial:100,min:0,max:100,  visible:true},
      {id:'mp',   name:'精神', initial:100,min:0,max:100,  visible:true},
      {id:'money',name:'存款', initial:50, min:0,max:99999,visible:true},
    ]
  },
  chains:[],   // 剧情链
  items:[],npcs:[],locations:[],events:[],statuses:[],weathers:[]
};

let U = {
  tab:'global',
  evtView:'locs',locId:null,evtId:null,openChoices:{},
  editItem:null,editNpc:null,editLoc:null,editStatus:null,editWeather:null,
};

// ─── 工具函数 ────────────────────────────────
function gid(p='x'){return`${p}_${Date.now().toString(36)}${Math.random().toString(36).substr(2,4)}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cloneOf(o){return JSON.parse(JSON.stringify(o))}
function evtById(id){return S.events.find(e=>e.id===id)}
function locById(id){return S.locations.find(l=>l.id===id)}
function evtsOfLoc(lid){return S.events.filter(e=>e.locationId===lid)}
let _tt;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className=type==='err'?'show err':type==='info'?'show info':'show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2600);
}

// ─── 渲染入口 ────────────────────────────────
function render(){
  document.getElementById('tb-gname').textContent=S.meta.title||'未命名';
  renderSidebar();renderMain();
}
function renderSidebar(){
  const tabs=[
    {id:'global',ic:'⚙',lb:'全局设定'},
    {id:'items', ic:'🎒',lb:'道具管理'},
    {id:'npcs',  ic:'👤',lb:'NPC 管理'},
    {id:'locs',  ic:'🗺',lb:'场景管理'},
    {id:'statuses',ic:'✨',lb:'状态管理'},
    {id:'weathers',ic:'🌦',lb:'天气管理'},
    {id:'events',ic:'📖',lb:'事件编辑'},
    {id:'export',ic:'💾',lb:'导出 / 导入'},
  ];
  document.getElementById('sidebar').innerHTML=`
    <div class="nav-lbl">MODULES</div>
    ${tabs.map(t=>`<div class="nav-item${U.tab===t.id?' active':''}" onclick="switchTab('${t.id}')"><span>${t.ic}</span><span>${t.lb}</span></div>`).join('')}`;
}
function renderMain(){
  const fn={global:pgGlobal,items:pgItems,npcs:pgNpcs,locs:pgLocs,statuses:pgStatuses,weathers:pgWeathers,events:pgEvents,export:pgExport};
  document.getElementById('main').innerHTML=(fn[U.tab]||pgGlobal)();
}
function switchTab(tab){
  U.tab=tab;
  if(tab==='events'){U.evtView='locs';U.locId=null;U.evtId=null;}
  render();
}

// ─── 全局设定 ────────────────────────────────
function pgGlobal(){
  return`
  <div class="ph"><div><div class="pt">全局设定</div><div class="ps">游戏基本信息、数值系统、剧情链管理</div></div></div>
  <div class="card">
    <div class="card-h">基本信息</div>
    <div class="card-b">
      <div class="fr"><span class="fl">游戏标题</span>
        <input type="text" value="${esc(S.meta.title)}" style="max-width:280px"
          onblur="S.meta.title=this.value;document.getElementById('tb-gname').textContent=this.value||'未命名'"></div>
      <div class="fr"><span class="fl">版本号</span>
        <input type="text" value="${esc(S.meta.version)}" style="max-width:120px" onblur="S.meta.version=this.value"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">时间段 <button class="btn sm" onclick="addTP()">+ 添加</button></div>
    <div class="card-b">
      <div class="tg">
        ${S.settings.timePeriods.map((tp,i)=>`
          <div style="display:flex;align-items:center;gap:3px">
            <span class="tag on">${esc(tp)}</span>
            <button class="btn xs del" onclick="delTP(${i})">×</button>
          </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">玩家数值 <button class="btn sm" onclick="addStat()">+ 添加</button></div>
    <div class="card-b" style="overflow-x:auto">
      ${S.settings.stats.length===0?`<div class="empty"><div>暂无数值定义</div></div>`:`
      <table class="st">
        <thead><tr><th>名称</th><th>ID</th><th>初始值</th><th>最小</th><th>最大</th><th>玩家可见</th><th></th></tr></thead>
        <tbody>${S.settings.stats.map((s,i)=>`<tr>
          <td><input class="nm" type="text" value="${esc(s.name)}" onblur="S.settings.stats[${i}].name=this.value"></td>
          <td><span style="font-family:var(--mono);font-size:11px;color:var(--t3)">${esc(s.id)}</span></td>
          <td><input type="number" value="${s.initial}" onblur="S.settings.stats[${i}].initial=+this.value"></td>
          <td><input type="number" value="${s.min}" onblur="S.settings.stats[${i}].min=+this.value"></td>
          <td><input type="number" value="${s.max}" onblur="S.settings.stats[${i}].max=+this.value"></td>
          <td style="text-align:center"><input type="checkbox" ${s.visible?'checked':''} onchange="S.settings.stats[${i}].visible=this.checked"></td>
          <td><button class="btn xs del" onclick="delStat(${i})">删除</button></td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>
  </div>
  <div class="card">
    <div class="card-h">剧情链管理 <button class="btn sm" onclick="addChain()">+ 添加</button></div>
    <div class="card-b">
      <div class="info-box">支线事件（storyline）可以归属某条剧情链，链内按顺序推进。这里管理所有剧情链的定义。</div>
      ${S.chains.length===0?`<div style="color:var(--t3);font-size:13px">暂无剧情链，点击添加</div>`
      :S.chains.map((c,i)=>`
        <div class="ar">
          <span style="font-family:var(--mono);font-size:11px;color:var(--t3);min-width:100px">${esc(c.id)}</span>
          <input type="text" value="${esc(c.name)}" placeholder="链名称" style="flex:1" onblur="S.chains[${i}].name=this.value">
          <input type="text" value="${esc(c.desc||'')}" placeholder="简介（可选）" style="flex:2" onblur="S.chains[${i}].desc=this.value">
          <button class="btn xs del" onclick="S.chains.splice(${i},1);render()">×</button>
        </div>`).join('')}
    </div>
  </div>`;
}
function addTP(){const v=prompt('新时间段名称');if(v&&v.trim()){S.settings.timePeriods.push(v.trim());render();}}
function delTP(i){if(!confirm(`删除时间段"${S.settings.timePeriods[i]}"？`))return;S.settings.timePeriods.splice(i,1);render();}
function addStat(){
  const nm=prompt('数值名称');if(!nm||!nm.trim())return;
  const id=prompt('数值ID（英文）');if(!id||!id.trim())return;
  if(S.settings.stats.find(s=>s.id===id.trim())){toast('该ID已存在','err');return;}
  S.settings.stats.push({id:id.trim(),name:nm.trim(),initial:100,min:0,max:100,visible:true});render();
}
function delStat(i){if(!confirm(`删除数值"${S.settings.stats[i].name}"？`))return;S.settings.stats.splice(i,1);render();}
function addChain(){
  const id=prompt('剧情链ID（英文，如 chain_doctor）');if(!id||!id.trim())return;
  if(S.chains.find(c=>c.id===id.trim())){toast('ID已存在','err');return;}
  S.chains.push({id:id.trim(),name:'',desc:''});render();
}

// ─── 道具管理 ────────────────────────────────
function syncItemForm(){
  if(!U.editItem)return;
  U.editItem.name=document.getElementById('it-nm')?.value||'';
  U.editItem.id=document.getElementById('it-id')?.value||'';
  U.editItem.desc=document.getElementById('it-ds')?.value||'';
  U.editItem.useEffect=document.getElementById('it-ef')?.value||'';
}
function pgItems(){
  return`
  <div class="ph">
    <div><div class="pt">道具管理</div><div class="ps">定义所有可获取的物品</div></div>
    <div class="pa"><button class="btn" onclick="startAddItem()">+ 新增道具</button></div>
  </div>
  ${U.editItem?itemEP():''}
  ${S.items.length===0&&!U.editItem?`<div class="empty"><div class="empty-ic">🎒</div><div>暂无道具</div></div>`
  :S.items.map((it,i)=>`
    <div class="li">
      <div class="li-info">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="li-name">${esc(it.name)}</span>
          ${it.hasDurability?`<span class="badge" style="background:rgba(85,153,204,.15);color:var(--info);border:1px solid rgba(85,153,204,.3)">耐久${it.durabilityVisible?'':'·隐藏'}</span>`:''}
        </div>
        <div class="li-id">${esc(it.id)}</div>
        ${it.desc?`<div class="li-sub">${esc(it.desc)}</div>`:''}
      </div>
      <div class="li-act">
        <button class="btn sm" onclick="startEditItem(${i})">编辑</button>
        <button class="btn sm del" onclick="delItem(${i})">删除</button>
      </div>
    </div>`).join('')}`;
}
function itemEP(){
  const it=U.editItem;
  return`
  <div class="ep">
    <div class="ep-t">${it._isNew?'✦ 新增道具':'✦ 编辑道具'}</div>
    <div class="fr"><span class="fl">道具名</span><input type="text" id="it-nm" value="${esc(it.name)}" placeholder="如：应急口粮"></div>
    <div class="fr"><span class="fl">ID</span>
      <input type="text" id="it-id" value="${esc(it.id)}" placeholder="如：item_ration" style="max-width:220px;font-family:var(--mono)" ${it._isNew?'':'disabled'}>
      ${it._isNew?'<span style="font-size:11px;color:var(--t3)">创建后不可修改</span>':''}
    </div>
    <div class="fr" style="align-items:flex-start"><span class="fl" style="margin-top:6px">描述</span>
      <textarea id="it-ds" placeholder="道具外观、背景...">${esc(it.desc)}</textarea></div>
    <div class="fr" style="align-items:flex-start"><span class="fl" style="margin-top:6px">使用效果</span>
      <textarea id="it-ef" style="min-height:50px" placeholder="使用后发生什么（文字描述）">${esc(it.useEffect||'')}</textarea></div>

function startEditItem(i){U.editItem={...cloneOf(S.items[i]),_isNew:false,_idx:i};render();}
function saveItem(){

function saveLoc(){
  const nm=document.getElementById('lc-nm')?.value.trim();

  const ds=document.getElementById('lc-ds')?.value.trim();
  const en=document.getElementById('lc-en')?.value.trim();
  if(!nm){toast('请输入场景名','err');return;}

  if(U.editLoc._isNew&&S.locations.find(l=>l.id===id)){toast('ID已存在','err');return;}
  const obj={id,name:nm,desc:ds,timePeriods:cloneOf(U.editLoc.timePeriods||[]),enterDesc:en,actions:cloneOf(U.editLoc.actions||[])};
  if(U.editLoc._isNew){S.locations.push(obj);toast('场景已添加');}

}
function delLoc(i){
  if(!confirm(`删除场景"${S.locations[i].name}"？相关事件也会删除。`))return;

}

function statusEP(){

  return`
  <div class="ep">
    <div class="ep-t">${s._isNew?'✦ 新增状态':'✦ 编辑状态'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">

    <button class="btn xs" onclick="addSimpEff('remove')">+ 添加</button>

    </div>

}
function passEffRow(pe,i){
  const ts=[['stat_per_tick','每时间段数值变化'],['stat_multiplier','数值变化倍率']];let fld='';
  if(pe.type==='stat_per_tick'){fld=`<select onchange="U.editStatus.passiveEffects[${i}].stat=this.value"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${pe.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>每时间段<input type="number" value="${pe.delta||0}" style="width:65px" onblur="U.editStatus.passiveEffects[${i}].delta=+this.value">`;}
  else if(pe.type==='stat_multiplier'){fld=`<select onchange="U.editStatus.passiveEffects[${i}].stat=this.value"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${pe.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select>的变化量乘<input type="number" value="${pe.multiplier===undefined?1:pe.multiplier}" step="0.1" style="width:65px" onblur="U.editStatus.passiveEffects[${i}].multiplier=+this.value">`;}
  return`<div class="er"><select onchange="chgPassEffType(${i},this.value)">${ts.map(t=>`<option value="${t[0]}" ${pe.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="U.editStatus.passiveEffects.splice(${i},1);render()">×</button></div>`;
}
function chgPassEffType(i,t){const d={stat_per_tick:{type:'stat_per_tick',stat:'',delta:0},stat_multiplier:{type:'stat_multiplier',stat:'',multiplier:1}};U.editStatus.passiveEffects[i]=d[t]||{type:t};render();}
function addPassEff(){U.editStatus.passiveEffects.push({type:'stat_per_tick',stat:'',delta:0});render();}
function simpEffRow(ef,i,phase){
  const ref=`U.editStatus.${phase==='apply'?'onApply':'onRemove'}`;
  const ts=[['stat','数值变化'],['item','道具增减'],['affinity','好感度'],['flag','设置旗标']];let fld='';
  if(ef.type==='stat'){fld=`<select onchange="${ref}[${i}].stat=this.value"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${ef.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="${ref}[${i}].delta=+this.value">`;}
  else if(ef.type==='item'){fld=`<select onchange="${ref}[${i}].item=this.value"><option value="">选道具...</option>${S.items.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><select onchange="${ref}[${i}].action=this.value"><option value="add" ${ef.action!=='remove'?'selected':''}>获得</option><option value="remove" ${ef.action==='remove'?'selected':''}>失去</option></select>`;}
  else if(ef.type==='affinity'){fld=`<select onchange="${ref}[${i}].npc=this.value"><option value="">选NPC...</option>${S.npcs.map(n=>`<option value="${esc(n.id)}" ${ef.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="${ref}[${i}].delta=+this.value">`;}
  else if(ef.type==='flag'){fld=`<input type="text" value="${esc(ef.flag||'')}" placeholder="flag名称" onblur="${ref}[${i}].flag=this.value"><select onchange="${ref}[${i}].value=this.value==='true'"><option value="true" ${ef.value!==false?'selected':''}>true</option><option value="false" ${ef.value===false?'selected':''}>false</option></select>`;}
  return`<div class="er"><select onchange="chgSimpEff('${phase}',${i},this.value)">${ts.map(t=>`<option value="${t[0]}" ${ef.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="${ref}.splice(${i},1);render()">×</button></div>`;
}
function chgSimpEff(phase,i,t){const ref=phase==='apply'?U.editStatus.onApply:U.editStatus.onRemove;const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true}};ref[i]=d[t]||{type:t};render();}
function addSimpEff(phase){const ref=phase==='apply'?U.editStatus.onApply:U.editStatus.onRemove;ref.push({type:'stat',stat:'',delta:0});render();}
function startAddStatus(){U.editStatus={_isNew:true,id:'',name:'',desc:'',icon:'',color:'#7fba5c',duration:3,stackable:false,passiveEffects:[],onApply:[],onRemove:[]};render();}
function startEditStatus(i){U.editStatus={...cloneOf(S.statuses[i]),_isNew:false,_idx:i};render();}
function saveStatus(){
  const nm=document.getElementById('st-nm')?.value.trim();const id=document.getElementById('st-id')?.value.trim();
  if(!nm){toast('请输入名称','err');return;}if(!id){toast('请输入ID','err');return;}
  if(U.editStatus._isNew&&S.statuses.find(s=>s.id===id)){toast('ID已存在','err');return;}
  const obj={id,name:nm,desc:document.getElementById('st-ds')?.value.trim(),icon:document.getElementById('st-ic')?.value.trim(),color:document.getElementById('st-cl')?.value,duration:+(document.getElementById('st-dur')?.value??3),stackable:!!(document.getElementById('st-sk')?.checked),passiveEffects:cloneOf(U.editStatus.passiveEffects||[]),onApply:cloneOf(U.editStatus.onApply||[]),onRemove:cloneOf(U.editStatus.onRemove||[])};
  if(U.editStatus._isNew){S.statuses.push(obj);toast('状态已添加');}else{S.statuses[U.editStatus._idx]=obj;toast('已保存');}

}
function delStatus(i){if(!confirm(`删除状态"${S.statuses[i].name}"？`))return;S.statuses.splice(i,1);render();}

// ─── 天气管理 ────────────────────────────────
function pgWeathers(){
  return`
  <div class="ph">
    <div><div class="pt">天气管理</div><div class="ps">定义随机天气及周期效果</div></div>
    <div class="pa"><button class="btn" onclick="startAddWeather()">+ 新增天气</button></div>
  </div>
  <div class="info-box">天气在每天开始时按权重随机刷新。效果组在每时间段末触发，满足所有条件时执行对应效果。</div>
  ${U.editWeather?weatherEP():''}
  ${S.weathers.length===0&&!U.editWeather?`<div class="empty"><div class="empty-ic">🌦</div><div>暂无天气定义</div></div>`
  :S.weathers.map((w,i)=>`
    <div class="li">
      <div class="li-info">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">${esc(w.icon||'☁')}</span>
          <span class="li-name" style="color:${esc(w.color||'var(--t1)')}">${esc(w.name)}</span>
          <span style="font-size:11px;color:var(--t3);font-family:var(--mono)">权重 ${w.weight||1}</span>
        </div>
        <div class="li-id">${esc(w.id)}</div>
        <div class="li-sub">${(w.tickEffectGroups||[]).length}组周期效果 · ${(w.statusTriggers||[]).length}个状态触发</div>
      </div>
      <div class="li-act">
        <button class="btn sm" onclick="startEditWeather(${i})">编辑</button>
        <button class="btn sm del" onclick="delWeather(${i})">删除</button>
      </div>
    </div>`).join('')}`;
}
function weatherEP(){
  const w=U.editWeather;
  return`
  <div class="ep">
    <div class="ep-t">${w._isNew?'✦ 新增天气':'✦ 编辑天气'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="fr"><span class="fl">天气名</span><input type="text" id="wx-nm" value="${esc(w.name)}" placeholder="如：酸雨"></div>
      <div class="fr"><span class="fl">ID</span><input type="text" id="wx-id" value="${esc(w.id)}" placeholder="如：weather_acid" style="font-family:var(--mono)" ${w._isNew?'':'disabled'}></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="fr"><span class="fl">图标</span><input type="text" id="wx-ic" value="${esc(w.icon||'')}" placeholder="🌧" style="width:56px"><span class="fl" style="min-width:auto">颜色</span><input type="color" id="wx-cl" value="${w.color||'#9955cc'}"></div>
      <div class="fr"><span class="fl">权重</span><input type="number" id="wx-wt" value="${w.weight||10}" min="1" style="width:65px"><span style="font-size:11px;color:var(--t3)">（越大越频繁）</span></div>
    </div>
    <div class="fr" style="align-items:flex-start;margin-bottom:10px"><span class="fl" style="margin-top:6px">描述</span><textarea id="wx-ds" placeholder="天气描述...">${esc(w.desc||'')}</textarea></div>
    <div class="fr" style="align-items:flex-start;margin-bottom:14px">
      <span class="fl" style="margin-top:4px">可用时段</span>
      <div class="tg">${S.settings.timePeriods.map(tp=>`<span class="tag${(w.timePeriods||[]).includes(tp)?' on':''}" onclick="toggleWxTP('${esc(tp)}')">${esc(tp)}</span>`).join('')}<span style="font-size:11px;color:var(--t3);margin-left:2px">（不选=全天）</span></div>
    </div>
    <div class="sec">时间段效果组</div>
    ${(w.tickEffectGroups||[]).map((g,gi)=>wxGrp(g,gi)).join('')}
    <button class="btn xs" onclick="addWxTickGroup()">+ 添加效果组</button>
    <div class="sec">触发状态</div>
    ${(w.statusTriggers||[]).map((t,ti)=>`
      <div class="ar">
        <select onchange="U.editWeather.statusTriggers[${ti}].statusId=this.value" style="flex:1">
          <option value="">选状态...</option>
          ${S.statuses.map(s=>`<option value="${esc(s.id)}" ${t.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:var(--t2)">概率</span>
        <input type="number" value="${t.probability===undefined?1:t.probability}" min="0" max="1" step="0.05" style="width:65px" onblur="U.editWeather.statusTriggers[${ti}].probability=Math.min(1,Math.max(0,+this.value))">
        <button class="btn xs del" onclick="U.editWeather.statusTriggers.splice(${ti},1);render()">×</button>
      </div>`).join('')}
    <button class="btn xs" onclick="U.editWeather.statusTriggers.push({statusId:'',probability:1});render()" style="margin-top:4px">+ 添加</button>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn sm pri" onclick="saveWeather()">保存</button>
      <button class="btn sm" onclick="U.editWeather=null;render()">取消</button>

}
function wxGrp(g,gi){
  return`<div class="grp-box">
    <div class="grp-head"><span class="grp-label">效果组 ${gi+1}</span><button class="btn xs del" onclick="U.editWeather.tickEffectGroups.splice(${gi},1);render()">删除组</button></div>
    <div class="sec" style="margin-top:0">触发条件（空=无条件）</div>
    ${(g.conditions||[]).map((c,ci)=>wxCondRow(c,ci,gi)).join('')}
    <button class="btn xs" onclick="addWxCond(${gi})">+ 条件</button>
    <div class="sec">执行效果</div>
    ${(g.effects||[]).map((ef,ei)=>wxEffRow(ef,ei,gi)).join('')}
    <button class="btn xs" onclick="addWxEff(${gi})">+ 效果</button>
  </div>`;
}
function wxCondRow(c,ci,gi){
  const ts=[['flag','旗标'],['stat','数值'],['affinity','好感度'],['item','道具']];let fld='';
  const ref=`U.editWeather.tickEffectGroups[${gi}].conditions[${ci}]`;
  if(c.type==='flag'){fld=`<input type="text" value="${esc(c.flag||'')}" placeholder="flag名称" onblur="${ref}.flag=this.value"><select onchange="${ref}.is=this.value==='true'"><option value="true" ${c.is!==false?'selected':''}>已设置</option><option value="false" ${c.is===false?'selected':''}>未设置</option></select>`;}
  else if(c.type==='stat'){fld=`<select onchange="${ref}.stat=this.value"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${c.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><select onchange="${ref}.op=this.value">${['>=','<=','>','<','=='].map(op=>`<option ${c.op===op?'selected':''}>${op}</option>`).join('')}</select><input type="number" value="${c.value||0}" onblur="${ref}.value=+this.value">`;}
  else if(c.type==='affinity'){fld=`<select onchange="${ref}.npc=this.value"><option value="">选NPC...</option>${S.npcs.map(n=>`<option value="${esc(n.id)}" ${c.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}</select><select onchange="${ref}.op=this.value">${['>=','<=','>','<','=='].map(op=>`<option ${c.op===op?'selected':''}>${op}</option>`).join('')}</select><input type="number" value="${c.value||0}" onblur="${ref}.value=+this.value">`;}
  else if(c.type==='item'){fld=`<select onchange="${ref}.item=this.value"><option value="">选道具...</option>${S.items.map(it=>`<option value="${esc(it.id)}" ${c.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><select onchange="${ref}.has=this.value==='true'"><option value="true" ${c.has!==false?'selected':''}>已持有</option><option value="false" ${c.has===false?'selected':''}>未持有</option></select>`;}
  return`<div class="cr"><select onchange="chgWxCond(${gi},${ci},this.value)">${ts.map(t=>`<option value="${t[0]}" ${c.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="U.editWeather.tickEffectGroups[${gi}].conditions.splice(${ci},1);render()">×</button></div>`;
}
function chgWxCond(gi,ci,t){const d={flag:{type:'flag',flag:'',is:true},stat:{type:'stat',stat:'',op:'>=',value:0},affinity:{type:'affinity',npc:'',op:'>=',value:0},item:{type:'item',item:'',has:true}};U.editWeather.tickEffectGroups[gi].conditions[ci]=d[t]||{type:t};render();}
function addWxCond(gi){U.editWeather.tickEffectGroups[gi].conditions.push({type:'item',item:'',has:true});render();}
function wxEffRow(ef,ei,gi){
  const ts=[['stat','数值变化'],['item','道具增减'],['affinity','好感度'],['flag','设置旗标'],['item_durability','消耗道具耐久']];
  const ref=`U.editWeather.tickEffectGroups[${gi}].effects[${ei}]`;
  const arr=`U.editWeather.tickEffectGroups[${gi}].effects`;let fld='';
  if(ef.type==='stat'){fld=`<select onchange="${ref}.stat=this.value"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${ef.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="${ref}.delta=+this.value">`;}
  else if(ef.type==='item'){fld=`<select onchange="${ref}.item=this.value"><option value="">选道具...</option>${S.items.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><select onchange="${ref}.action=this.value"><option value="add" ${ef.action!=='remove'?'selected':''}>获得</option><option value="remove" ${ef.action==='remove'?'selected':''}>失去</option></select>`;}
  else if(ef.type==='affinity'){fld=`<select onchange="${ref}.npc=this.value"><option value="">选NPC...</option>${S.npcs.map(n=>`<option value="${esc(n.id)}" ${ef.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="${ref}.delta=+this.value">`;}
  else if(ef.type==='flag'){fld=`<input type="text" value="${esc(ef.flag||'')}" placeholder="flag名称" onblur="${ref}.flag=this.value"><select onchange="${ref}.value=this.value==='true'"><option value="true" ${ef.value!==false?'selected':''}>true</option><option value="false" ${ef.value===false?'selected':''}>false</option></select>`;}
  else if(ef.type==='item_durability'){const di=S.items.filter(it=>it.hasDurability);fld=`<select onchange="${ref}.item=this.value"><option value="">${di.length===0?'（先启用道具耐久）':'选道具...'}</option>${di.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" placeholder="变化量" onblur="${ref}.delta=+this.value">`;}
  return`<div class="er"><select onchange="chgWxEff(${gi},${ei},this.value)">${ts.map(t=>`<option value="${t[0]}" ${ef.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="${arr}.splice(${ei},1);render()">×</button></div>`;
}
function chgWxEff(gi,ei,t){const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true},item_durability:{type:'item_durability',item:'',delta:-10}};U.editWeather.tickEffectGroups[gi].effects[ei]=d[t]||{type:t};render();}
function addWxEff(gi){U.editWeather.tickEffectGroups[gi].effects.push({type:'stat',stat:'',delta:0});render();}
function addWxTickGroup(){U.editWeather.tickEffectGroups.push({conditions:[],effects:[]});render();}
function toggleWxTP(tp){if(!U.editWeather)return;const a=U.editWeather.timePeriods;const i=a.indexOf(tp);if(i>=0)a.splice(i,1);else a.push(tp);render();}
function startAddWeather(){U.editWeather={_isNew:true,id:'',name:'',desc:'',icon:'',color:'#9955cc',weight:10,timePeriods:[],tickEffectGroups:[],statusTriggers:[]};render();}
function startEditWeather(i){U.editWeather={...cloneOf(S.weathers[i]),_isNew:false,_idx:i};render();}
function saveWeather(){
  const nm=document.getElementById('wx-nm')?.value.trim();const id=document.getElementById('wx-id')?.value.trim();
  if(!nm){toast('请输入名称','err');return;}if(!id){toast('请输入ID','err');return;}
  if(U.editWeather._isNew&&S.weathers.find(w=>w.id===id)){toast('ID已存在','err');return;}
  const obj={id,name:nm,desc:document.getElementById('wx-ds')?.value.trim(),icon:document.getElementById('wx-ic')?.value.trim(),color:document.getElementById('wx-cl')?.value,weight:+(document.getElementById('wx-wt')?.value||10),timePeriods:cloneOf(U.editWeather.timePeriods||[]),tickEffectGroups:cloneOf(U.editWeather.tickEffectGroups||[]),statusTriggers:cloneOf(U.editWeather.statusTriggers||[])};
  if(U.editWeather._isNew){S.weathers.push(obj);toast('天气已添加');}else{S.weathers[U.editWeather._idx]=obj;toast('已保存');}
  U.editWeather=null;render();
}
function delWeather(i){if(!confirm(`删除天气"${S.weathers[i].name}"？`))return;S.weathers.splice(i,1);render();}

// ─── 事件编辑 ────────────────────────────────
const EVT_TYPE_INFO = {
  daily:     {label:'日常',     badge:'b-daily',    desc:'可重复触发，从日常池随机抽取'},
  mainline:  {label:'主线',     badge:'b-mainline', desc:'触发一次，按机制自动触发'},
  storyline: {label:'支线',     badge:'b-storyline',desc:'触发一次，属于某条剧情链'},
};

function pgEvents(){
  if(U.evtView==='locs')return pgEvtLocs();
  if(U.evtView==='list')return pgEvtList();
  if(U.evtView==='detail')return pgEvtDetail();
  return pgEvtLocs();
}
function pgEvtLocs(){
  if(S.locations.length===0)return`<div class="ph"><div><div class="pt">事件编辑</div></div></div><div class="empty"><div class="empty-ic">🗺</div><div>请先在"场景管理"中创建场景</div></div>`;
  return`
  <div class="ph"><div><div class="pt">事件编辑</div><div class="ps">选择要编辑的场景</div></div></div>
  ${S.locations.map(l=>{
    const evts=evtsOfLoc(l.id);
    const counts={daily:0,mainline:0,storyline:0};
    evts.forEach(e=>counts[e.type]=(counts[e.type]||0)+1);
    return`<div class="lc" onclick="enterLoc('${l.id}')">
      <span style="font-size:22px">📍</span>
      <div style="flex:1">
        <div style="font-size:15px">${esc(l.name)}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:4px;display:flex;gap:8px">
          <span>日常 ${counts.daily}</span><span>主线 ${counts.mainline}</span><span>支线 ${counts.storyline}</span>
          <span>· ${(l.timePeriods||[]).join(' / ')||'全天'}</span>
        </div>
      </div>
      <span style="color:var(--t3);font-size:18px">›</span>
    </div>`;
  }).join('')}`;
}
function enterLoc(lid){U.locId=lid;U.evtView='list';render();}

function pgEvtList(){
  const loc=locById(U.locId);if(!loc){U.evtView='locs';return pgEvtLocs();}
  const evts=evtsOfLoc(U.locId);
  const groups={mainline:evts.filter(e=>e.type==='mainline'),storyline:evts.filter(e=>e.type==='storyline'),daily:evts.filter(e=>e.type==='daily')};
  function evtCard(e){
    const ti=EVT_TYPE_INFO[e.type]||EVT_TYPE_INFO.daily;
    return`<div class="li">
      <div class="li-info">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="li-name">${esc(e.name||'（未命名）')}</span>
          <span class="badge ${ti.badge}">${ti.label}</span>
          ${e.type==='mainline'?`<span style="font-size:11px;color:var(--t3)">第${e.chapter||1}章·${e.triggerMechanism==='day'?`第${e.triggerDay||1}天`:e.triggerMechanism==='entrance'?`入口:${e.entranceLabel||'?'}`:'条件触发'}</span>`:''}
          ${e.type==='storyline'&&e.chainId?`<span style="font-size:11px;color:var(--purple)">${esc(S.chains.find(c=>c.id===e.chainId)?.name||e.chainId)} #${e.chainOrder||1}</span>`:''}
        </div>
        <div class="li-id">${esc(e.id)}</div>
        <div class="li-sub">${e.paragraphs?.length||0} 段落 · ${e.choices?.length||0} 选项 · 时段：${(e.timePeriods||[]).join(' ')||'全天'}</div>
      </div>
      <div class="li-act">
        <button class="btn sm" onclick="openEvt('${e.id}')">编辑</button>
        <button class="btn sm del" onclick="delEvt('${e.id}')">删除</button>
      </div>
    </div>`;
  }
  return`
  <div class="bc"><span class="bcl" onclick="U.evtView='locs';render()">事件编辑</span><span class="bcs">›</span><span>${esc(loc.name)}</span></div>
  <div class="ph">
    <div><div class="pt">${esc(loc.name)}</div><div class="ps">${evts.length} 个事件</div></div>
    <div class="pa">
      <button class="btn sm" onclick="addEvt('daily')" style="border-color:rgba(127,186,92,.5);color:var(--acc2)">+ 日常</button>
      <button class="btn sm" onclick="addEvt('mainline')" style="border-color:rgba(200,145,63,.5);color:var(--acc)">+ 主线</button>
      <button class="btn sm" onclick="addEvt('storyline')" style="border-color:rgba(153,85,204,.5);color:var(--purple)">+ 支线</button>
    </div>
  </div>
  ${evts.length===0?`<div class="empty"><div class="empty-ic">📖</div><div>该场景暂无事件</div></div>`:''}
  ${groups.mainline.length?`<div class="sec">主线事件</div>${groups.mainline.map(evtCard).join('')}`:''}
  ${groups.storyline.length?`<div class="sec">支线事件</div>${groups.storyline.map(evtCard).join('')}`:''}
  ${groups.daily.length?`<div class="sec">日常循环</div>${groups.daily.map(evtCard).join('')}`:''}`;
}

function addEvt(type){
  const nm=prompt(`新${EVT_TYPE_INFO[type]?.label||type}事件名称`);if(!nm||!nm.trim())return;
  const e={id:gid('evt'),locationId:U.locId,name:nm.trim(),type,timePeriods:[],conditions:[],paragraphs:[],choices:[]};
  if(type==='daily'){e.weight=1;}
  if(type==='mainline'){e.chapter=1;e.triggerMechanism='condition';e.triggerDay=1;e.entranceLabel='';}
  if(type==='storyline'){e.chainId='';e.chainOrder=1;}
  S.events.push(e);U.evtId=e.id;U.evtView='detail';render();
}
function openEvt(id){U.evtId=id;U.evtView='detail';render();}
function delEvt(id){const e=evtById(id);if(!confirm(`删除事件"${e?.name}"？`))return;S.events=S.events.filter(ev=>ev.id!==id);render();}

// ─── 事件详情 ────────────────────────────────
function pgEvtDetail(){
  const e=evtById(U.evtId);const loc=locById(U.locId);
  if(!e){U.evtView='list';return pgEvtList();}
  const ti=EVT_TYPE_INFO[e.type]||EVT_TYPE_INFO.daily;
  return`
  <div class="bc">
    <span class="bcl" onclick="U.evtView='locs';render()">事件编辑</span><span class="bcs">›</span>
    <span class="bcl" onclick="U.evtView='list';render()">${esc(loc?.name||'?')}</span><span class="bcs">›</span>
    <span>${esc(e.name)}</span>
  </div>
  <div class="card">
    <div class="card-h">基本信息</div>
    <div class="card-b">
      <div class="fr"><span class="fl">事件名</span>
        <input type="text" value="${esc(e.name)}" style="max-width:300px" onblur="evtById('${e.id}').name=this.value"></div>
      <div class="fr"><span class="fl">类型</span>
        <span class="badge ${ti.badge}">${ti.label}</span>
        <span style="font-size:12px;color:var(--t3)">${ti.desc}</span>
      </div>
      ${e.type==='daily'?`
      <div class="fr"><span class="fl">权重</span>
        <input type="number" value="${e.weight||1}" min="1" style="width:70px" onblur="evtById('${e.id}').weight=+this.value">
        <span style="font-size:12px;color:var(--t3)">数值越大在日常池中被抽到的概率越高</span>
      </div>`:''}
      ${e.type==='mainline'?`
      <div class="fr"><span class="fl">章节</span>

function toggleEvtTP(evtId,tp){const e=evtById(evtId);if(!e)return;const a=e.timePeriods;const i=a.indexOf(tp);if(i>=0)a.splice(i,1);else a.push(tp);render();}

// ─── 触发条件 ────────────────────────────────
function condRow(c,ci,kind,evtId,choiceIdx){
  const pfx=`${kind}|${evtId}|${choiceIdx}`;
  const types=[['flag','旗标'],['stat','数值'],['affinity','好感度'],['item','道具'],['status','状态'],['weather','天气']];
  let fld='';
  if(c.type==='flag'){fld=`<input type="text" value="${esc(c.flag||'')}" placeholder="flag名称" onblur="updCond('${pfx}',${ci},'flag',this.value)"><select onchange="updCond('${pfx}',${ci},'is',this.value==='true')"><option value="true" ${c.is!==false?'selected':''}>已设置</option><option value="false" ${c.is===false?'selected':''}>未设置</option></select>`;}
  else if(c.type==='stat'){fld=`<select onchange="updCond('${pfx}',${ci},'stat',this.value)"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${c.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><select onchange="updCond('${pfx}',${ci},'op',this.value)">${['>=','<=','>','<','=='].map(op=>`<option ${c.op===op?'selected':''}>${op}</option>`).join('')}</select><input type="number" value="${c.value||0}" onblur="updCond('${pfx}',${ci},'value',+this.value)">`;}
  else if(c.type==='affinity'){fld=`<select onchange="updCond('${pfx}',${ci},'npc',this.value)"><option value="">选NPC...</option>${S.npcs.map(n=>`<option value="${esc(n.id)}" ${c.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}</select><select onchange="updCond('${pfx}',${ci},'op',this.value)">${['>=','<=','>','<','=='].map(op=>`<option ${c.op===op?'selected':''}>${op}</option>`).join('')}</select><input type="number" value="${c.value||0}" onblur="updCond('${pfx}',${ci},'value',+this.value)">`;}
  else if(c.type==='item'){fld=`<select onchange="updCond('${pfx}',${ci},'item',this.value)"><option value="">选道具...</option>${S.items.map(it=>`<option value="${esc(it.id)}" ${c.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><select onchange="updCond('${pfx}',${ci},'has',this.value==='true')"><option value="true" ${c.has!==false?'selected':''}>已持有</option><option value="false" ${c.has===false?'selected':''}>未持有</option></select>`;}
  else if(c.type==='status'){fld=`<select onchange="updCond('${pfx}',${ci},'statusId',this.value)"><option value="">选状态...</option>${S.statuses.map(s=>`<option value="${esc(s.id)}" ${c.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}</select><select onchange="updCond('${pfx}',${ci},'has',this.value==='true')"><option value="true" ${c.has!==false?'selected':''}>处于此状态</option><option value="false" ${c.has===false?'selected':''}>未处于</option></select>`;}
  else if(c.type==='weather'){fld=`<select onchange="updCond('${pfx}',${ci},'weatherId',this.value)"><option value="">选天气...</option>${S.weathers.map(w=>`<option value="${esc(w.id)}" ${c.weatherId===w.id?'selected':''}>${esc(w.icon||'')} ${esc(w.name)}</option>`).join('')}</select>`;}
  return`<div class="cr"><select onchange="chgCondType('${pfx}',${ci},this.value)">${types.map(t=>`<option value="${t[0]}" ${c.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="delCond('${pfx}',${ci})">×</button></div>`;
}
function resolveConds(pfx){
  const p=pfx.split('|');const kind=p[0];
  if(kind==='E'){const e=evtById(p.slice(1,-1).join('|'));return e?.conditions;}
  if(kind==='C'){const ci=+p[p.length-1];const e=evtById(p.slice(1,-1).join('|'));return e?.choices[ci]?.conditions;}
  return null;
}
function addCond(evtId,kind,ci){const arr=resolveConds(`${kind}|${evtId}|${ci}`);if(!arr)return;arr.push({type:'flag',flag:'',is:true});render();}
function chgCondType(pfx,ci,t){
  const arr=resolveConds(pfx);if(!arr)return;
  const d={flag:{type:'flag',flag:'',is:true},stat:{type:'stat',stat:'',op:'>=',value:0},affinity:{type:'affinity',npc:'',op:'>=',value:0},item:{type:'item',item:'',has:true},status:{type:'status',statusId:'',has:true},weather:{type:'weather',weatherId:''}};
  arr[ci]=d[t]||{type:t};render();
}
function updCond(pfx,ci,field,val){const arr=resolveConds(pfx);if(!arr)return;arr[ci][field]=val;}
function delCond(pfx,ci){const arr=resolveConds(pfx);if(!arr)return;arr.splice(ci,1);render();}

// ─── 段落（含样式系统）────────────────────────
function paraBlock(evtId,p,pi,total){

        <option value="dialogue" ${p.type==='dialogue'?'selected':''}>对话</option>

      ${p.type==='dialogue'?`<select onchange="updPara('${evtId}',${pi},'speaker',this.value)" title="说话者">
        <option value="">说话者...</option>
        ${S.npcs.map(n=>`<option value="${esc(n.id)}" ${p.speaker===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}

      </select>

        onblur="updPara('${evtId}',${pi},'text',this.value)">${esc(p.text||'')}</textarea>

function addPara(evtId){const e=evtById(evtId);if(!e)return;e.paragraphs.push({type:'narrate',text:'',style:'normal',customColor:'',size:''});render();}
function delPara(evtId,pi){const e=evtById(evtId);if(!e)return;e.paragraphs.splice(pi,1);render();}
function movePara(evtId,pi,d){const e=evtById(evtId);if(!e)return;const a=e.paragraphs,ni=pi+d;if(ni<0||ni>=a.length)return;[a[pi],a[ni]]=[a[ni],a[pi]];render();}
function updPara(evtId,pi,field,val){const e=evtById(evtId);if(!e)return;e.paragraphs[pi][field]=val;}

// ─── 选项 ───────────────────────────────────

      </div>
      <span style="color:var(--t3);font-size:11px;margin-left:8px">${open?'▲':'▼'}</span>

      ${(ch.effects||[]).map((ef,ei)=>effRow(ef,ei,evtId,ci)).join('')}

function toggleChoice(evtId,ci){const k=`${evtId}_${ci}`;U.openChoices[k]=!U.openChoices[k];render();}
function addChoice(evtId){const e=evtById(evtId);if(!e)return;e.choices.push({text:'',conditions:[],effects:[],next:null});U.openChoices[`${evtId}_${e.choices.length-1}`]=true;render();}
function delChoice(evtId,ci){const e=evtById(evtId);if(!e)return;e.choices.splice(ci,1);render();}

// ─── 选项效果 ────────────────────────────────
function effRow(ef,ei,evtId,ci){
  const types=[['stat','数值变化'],['item','道具增减'],['affinity','好感度变化'],['flag','设置旗标'],['time','消耗时间'],['add_status','添加状态'],['remove_status','移除状态'],['item_durability','消耗道具耐久']];
  let fld='';
  if(ef.type==='stat'){fld=`<select onchange="updEff('${evtId}',${ci},${ei},'stat',this.value)"><option value="">选数值...</option>${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${ef.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;}
  else if(ef.type==='item'){fld=`<select onchange="updEff('${evtId}',${ci},${ei},'item',this.value)"><option value="">选道具...</option>${S.items.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><select onchange="updEff('${evtId}',${ci},${ei},'action',this.value)"><option value="add" ${ef.action!=='remove'?'selected':''}>获得</option><option value="remove" ${ef.action==='remove'?'selected':''}>失去</option></select>`;}
  else if(ef.type==='affinity'){fld=`<select onchange="updEff('${evtId}',${ci},${ei},'npc',this.value)"><option value="">选NPC...</option>${S.npcs.map(n=>`<option value="${esc(n.id)}" ${ef.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;}
  else if(ef.type==='flag'){fld=`<input type="text" value="${esc(ef.flag||'')}" placeholder="flag名称" onblur="updEff('${evtId}',${ci},${ei},'flag',this.value)"><select onchange="updEff('${evtId}',${ci},${ei},'value',this.value==='true')"><option value="true" ${ef.value!==false?'selected':''}>设为 true</option><option value="false" ${ef.value===false?'selected':''}>设为 false</option></select>`;}
  else if(ef.type==='time'){fld=`<input type="number" value="${ef.cost||1}" min="1" max="6" style="width:58px" onblur="updEff('${evtId}',${ci},${ei},'cost',+this.value)"><span style="font-size:12px;color:var(--t2)">个时间段</span>`;}
  else if(ef.type==='add_status'){fld=`<select onchange="updEff('${evtId}',${ci},${ei},'statusId',this.value)"><option value="">选状态...</option>${S.statuses.map(s=>`<option value="${esc(s.id)}" ${ef.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}</select><input type="number" value="${ef.duration===undefined?-1:ef.duration}" style="width:65px" title="持续时间段（-1=使用状态自带时长）" onblur="updEff('${evtId}',${ci},${ei},'duration',+this.value)"><span style="font-size:11px;color:var(--t3)">时间段(-1=默认)</span>`;}
  else if(ef.type==='remove_status'){fld=`<select onchange="updEff('${evtId}',${ci},${ei},'statusId',this.value)"><option value="">选状态...</option>${S.statuses.map(s=>`<option value="${esc(s.id)}" ${ef.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}</select>`;}
  else if(ef.type==='item_durability'){const di=S.items.filter(it=>it.hasDurability);fld=`<select onchange="updEff('${evtId}',${ci},${ei},'item',this.value)"><option value="">${di.length===0?'（先为道具启用耐久）':'选道具...'}</option>${di.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}</select><input type="number" value="${ef.delta||0}" onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;}
  return`<div class="er"><select onchange="chgEffType('${evtId}',${ci},${ei},this.value)">${types.map(t=>`<option value="${t[0]}" ${ef.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}</select>${fld}<button class="btn xs del" onclick="delEff('${evtId}',${ci},${ei})">×</button></div>`;
}
function addEff(evtId,ci){const e=evtById(evtId);if(!e)return;e.choices[ci].effects.push({type:'stat',stat:'',delta:0});render();}
function delEff(evtId,ci,ei){const e=evtById(evtId);if(!e)return;e.choices[ci].effects.splice(ei,1);render();}
function updEff(evtId,ci,ei,field,val){const e=evtById(evtId);if(!e)return;e.choices[ci].effects[ei][field]=val;}
function chgEffType(evtId,ci,ei,t){
  const e=evtById(evtId);if(!e)return;
  const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true},time:{type:'time',cost:1},add_status:{type:'add_status',statusId:'',duration:-1},remove_status:{type:'remove_status',statusId:''},item_durability:{type:'item_durability',item:'',delta:-10}};
  e.choices[ci].effects[ei]=d[t]||{type:t};render();
}

    <div style="display:flex;gap:8px">
      <button class="btn" onclick="importClick()">⬆ 从文件导入</button>
      <button class="btn" onclick="document.getElementById('paste-wrap').style.display='block'">📋 粘贴 JSON</button>
    </div>
    <div id="paste-wrap" style="display:none;margin-top:12px">
      <textarea id="paste-json" style="font-family:var(--mono);font-size:12px;min-height:160px;color:var(--acc2)" placeholder="粘贴 JSON 内容..."></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn sm pri" onclick="importPaste()">导入</button>
        <button class="btn sm" onclick="document.getElementById('paste-wrap').style.display='none'">取消</button>
      </div>
    </div>
  </div></div>
  <div class="card"><div class="card-h">当前数据概览</div><div class="card-b">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${Object.entries(st).map(([k,v])=>`<div style="background:var(--s2);border:1px solid var(--b1);border-radius:3px;padding:12px;text-align:center"><div style="font-size:24px;font-family:var(--mono);color:var(--acc)">${v}</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${k}</div></div>`).join('')}
    </div>
  </div></div>`;
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download=`${S.meta.title||'story'}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);toast('已导出 JSON');
}
function importClick(){document.getElementById('file-input').click();}
function handleFileImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{applyImport(JSON.parse(e.target.result));}catch{toast('JSON 解析失败','err');}};
  r.readAsText(f);ev.target.value='';
}
function importPaste(){try{applyImport(JSON.parse(document.getElementById('paste-json')?.value));}catch{toast('JSON 格式错误','err');}}
function applyImport(data){
  if(!data?.meta||!data?.settings){toast('数据格式不正确','err');return;}
  if(!data.statuses)data.statuses=[];if(!data.weathers)data.weathers=[];if(!data.chains)data.chains=[];
  S=data;
  U={tab:'global',evtView:'locs',locId:null,evtId:null,openChoices:{},editItem:null,editNpc:null,editLoc:null,editStatus:null,editWeather:null};
  render();toast('导入成功！','info');
}

render();
</script>
</body>
</html>
