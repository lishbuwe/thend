<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>末世文游编辑器</title>
<style>
:root{
  --bg:#12121a;--s1:#1a1a24;--s2:#22222e;--s3:#2a2a38;
  --b1:#30303e;--b2:#42424e;
  --t1:#d4d0c8;--t2:#8a8880;--t3:#555560;
  --acc:#c8913f;--acc2:#7fba5c;--danger:#e05555;--info:#5599cc;
  --mono:'Courier New',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:46px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.tb-title{font-family:var(--mono);font-size:12px;color:var(--acc);letter-spacing:3px}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-game{font-size:13px;color:var(--t2)}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:172px;background:var(--s1);border-right:1px solid var(--b1);padding:10px 0;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:24px 28px}
.nav-lbl{font-size:10px;color:var(--t3);padding:8px 16px 3px;letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--t2);border-left:2px solid transparent;font-size:13px;user-select:none;transition:all .12s}
.nav-item:hover{color:var(--t1);background:var(--s2)}
.nav-item.active{color:var(--acc);border-left-color:var(--acc);background:rgba(200,145,63,.08)}
.btn{padding:6px 14px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;border-radius:3px;font-size:13px;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#12121a;font-weight:700}
.btn.pri:hover{background:#d8a050;border-color:#d8a050;color:#12121a}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:2px 7px;font-size:11px}
.btn.del{border-color:transparent;color:var(--t3)}
.btn.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(224,85,85,.1)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--s2);border-color:var(--b1);color:var(--t1)}
input[type=text],input[type=number],textarea,select{background:var(--bg);border:1px solid var(--b1);color:var(--t1);padding:6px 10px;border-radius:3px;font-size:13px;font-family:inherit;outline:none;transition:border-color .12s}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
input:disabled,select:disabled{opacity:.45;cursor:not-allowed}
textarea{resize:vertical;min-height:72px;line-height:1.65;width:100%}
select option{background:var(--s2)}
input[type=number]{width:80px}
input[type=color]{padding:2px 4px;height:32px;width:44px;cursor:pointer}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fr:last-child{margin-bottom:0}
.fl{color:var(--t2);font-size:12px;white-space:nowrap;min-width:52px}
.fr input,.fr select{flex:1}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:4px;margin-bottom:14px}
.card-h{padding:11px 16px;border-bottom:1px solid var(--b1);font-size:11px;color:var(--acc);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.card-b{padding:16px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pt{font-size:20px;font-weight:600}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.pa{display:flex;gap:8px;align-items:center}
.li{display:flex;align-items:center;padding:10px 14px;border:1px solid var(--b1);border-radius:3px;margin-bottom:6px;background:var(--s2);gap:10px;transition:border-color .12s}
.li:hover{border-color:var(--b2)}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px}
.li-id{font-size:11px;color:var(--t3);font-family:var(--mono)}
.li-sub{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-act{display:flex;gap:6px;flex-shrink:0}
.ep{border:1px solid var(--acc);border-radius:3px;padding:16px;margin-bottom:10px;background:var(--bg)}
.ep-t{font-size:12px;color:var(--acc);font-family:var(--mono);margin-bottom:13px}
.tg{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:3px 11px;border:1px solid var(--b2);border-radius:12px;font-size:12px;cursor:pointer;color:var(--t2);user-select:none;transition:all .12s}
.tag:hover{border-color:var(--acc);color:var(--t1)}
.tag.on{border-color:var(--acc);background:rgba(200,145,63,.15);color:var(--acc)}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:7px 10px;color:var(--t3);font-size:11px;font-weight:400;border-bottom:1px solid var(--b1)}
.st td{padding:7px 10px;border-bottom:1px solid var(--b1);vertical-align:middle}
.st tr:last-child td{border-bottom:none}
.st input{width:70px}
.st input.nm{width:90px}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:13px;color:var(--t2)}
.bcl{color:var(--acc);cursor:pointer}
.bcl:hover{text-decoration:underline}
.bcs{color:var(--t3)}
.lc{border:1px solid var(--b1);border-radius:4px;padding:14px 16px;margin-bottom:10px;background:var(--s2);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:12px}
.lc:hover{border-color:var(--acc);background:var(--s3)}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;font-family:var(--mono)}
.b-story{background:rgba(85,153,204,.15);color:var(--info);border:1px solid rgba(85,153,204,.3)}
.b-random{background:rgba(127,186,92,.15);color:var(--acc2);border:1px solid rgba(127,186,92,.3)}
.sec{font-size:11px;color:var(--acc);font-family:var(--mono);letter-spacing:.5px;margin:13px 0 7px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--b1)}
.pb{border:1px solid var(--b1);border-radius:3px;margin-bottom:8px;overflow:hidden}
.pb-h{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--s2);border-bottom:1px solid var(--b1)}
.pb-h select{padding:3px 6px;font-size:12px}
.pb-b{padding:10px}
.cb{border:1px solid var(--b1);border-radius:3px;margin-bottom:8px}
.cb-h{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);cursor:pointer}
.cb-h:hover{background:var(--s3)}
.cb-num{font-size:11px;color:var(--t3);font-family:var(--mono);min-width:22px}
.cb-prev{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.cb-b{padding:12px 14px;border-top:1px solid var(--b1);display:none}
.cb-b.open{display:block}
.cr,.er{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.cr select,.er select{padding:4px 6px;font-size:12px}
.cr input,.er input{padding:4px 6px;font-size:12px;width:72px}
.ar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-ic{font-size:32px;margin-bottom:10px}
.grp-box{border:1px solid var(--b1);border-radius:3px;padding:10px;margin-bottom:8px;background:var(--bg)}
.grp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.grp-label{font-size:11px;color:var(--acc2);font-family:var(--mono)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--acc2);color:var(--acc2);padding:9px 16px;border-radius:4px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}
#toast.err{border-color:var(--danger);color:var(--danger)}
#toast.info{border-color:var(--acc);color:var(--acc)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}
</style>
</head>
<body>
<div id="topbar">
  <div class="tb-title">▸ WASTELAND · STORY EDITOR</div>
  <div class="tb-right">
    <span class="tb-game" id="tb-gname">末世纪元</span>
    <button class="btn sm" onclick="importClick()">⬆ 导入</button>
    <button class="btn sm pri" onclick="exportJSON()">⬇ 导出 JSON</button>
  </div>
</div>
<div id="body">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>
<div id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileImport(event)">
<script>
// ─── 初始数据 ───────────────────────────────
let S = {
  meta: { title: '末世纪元', version: '0.1' },
  settings: {
    timePeriods: ['清晨','上午','下午','傍晚','夜晚','深夜'],
    stats: [
      {id:'hp',   name:'体力', initial:100, min:0, max:100,   visible:true},
      {id:'mp',   name:'精神', initial:100, min:0, max:100,   visible:true},
      {id:'money',name:'存款', initial:50,  min:0, max:99999, visible:true},
    ]
  },
  items: [],
  npcs: [],
  locations: [],
  events: [],
  statuses: [],
  weathers: []
};

let U = {
  tab: 'global',
  evtView: 'locs', locId: null, evtId: null,
  openChoices: {},
  editItem: null, editNpc: null, editLoc: null,
  editStatus: null, editWeather: null,
};

// ─── 工具函数 ────────────────────────────────
function gid(p='x'){return `${p}_${Date.now().toString(36)}${Math.random().toString(36).substr(2,4)}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cloneOf(o){return JSON.parse(JSON.stringify(o))}
function evtById(id){return S.events.find(e=>e.id===id)}
function locById(id){return S.locations.find(l=>l.id===id)}
function evtsOfLoc(lid){return S.events.filter(e=>e.locationId===lid)}
let _tt;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=type==='err'?'show err':type==='info'?'show info':'show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',2600);
}

// ─── 渲染入口 ────────────────────────────────
function render(){
  document.getElementById('tb-gname').textContent=S.meta.title||'未命名';
  renderSidebar(); renderMain();
}
function renderSidebar(){
  const tabs=[
    {id:'global',ic:'⚙',lb:'全局设定'},
    {id:'items', ic:'🎒',lb:'道具管理'},
    {id:'npcs',  ic:'👤',lb:'NPC 管理'},
    {id:'locs',  ic:'🗺',lb:'场景管理'},
    {id:'statuses',ic:'✨',lb:'状态管理'},
    {id:'weathers',ic:'🌦',lb:'天气管理'},
    {id:'events',ic:'📖',lb:'事件编辑'},
    {id:'export',ic:'💾',lb:'导出 / 导入'},
  ];
  document.getElementById('sidebar').innerHTML=`
    <div class="nav-lbl">MODULES</div>
    ${tabs.map(t=>`<div class="nav-item${U.tab===t.id?' active':''}" onclick="switchTab('${t.id}')"><span>${t.ic}</span><span>${t.lb}</span></div>`).join('')}`;
}
function renderMain(){
  const fn={global:pgGlobal,items:pgItems,npcs:pgNpcs,locs:pgLocs,
    statuses:pgStatuses,weathers:pgWeathers,events:pgEvents,export:pgExport};
  document.getElementById('main').innerHTML=(fn[U.tab]||pgGlobal)();
}
function switchTab(tab){
  U.tab=tab;
  if(tab==='events'){U.evtView='locs';U.locId=null;U.evtId=null;}
  render();
}

// ─── 全局设定 ────────────────────────────────
function pgGlobal(){
  const st=S.settings;
  return `
  <div class="ph"><div><div class="pt">全局设定</div><div class="ps">游戏基本信息与数值系统</div></div></div>
  <div class="card">
    <div class="card-h">基本信息</div>
    <div class="card-b">
      <div class="fr"><span class="fl">游戏标题</span>
        <input type="text" value="${esc(S.meta.title)}" style="max-width:280px"
          onblur="S.meta.title=this.value;document.getElementById('tb-gname').textContent=this.value||'未命名'"></div>
      <div class="fr"><span class="fl">版本号</span>
        <input type="text" value="${esc(S.meta.version)}" style="max-width:120px"
          onblur="S.meta.version=this.value"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">时间段 <button class="btn sm" onclick="addTP()">+ 添加</button></div>
    <div class="card-b">
      <div class="tg">
        ${st.timePeriods.map((tp,i)=>`
          <div style="display:flex;align-items:center;gap:3px">
            <span class="tag on">${esc(tp)}</span>
            <button class="btn xs del" onclick="delTP(${i})">×</button>
          </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">玩家数值 <button class="btn sm" onclick="addStat()">+ 添加</button></div>
    <div class="card-b" style="overflow-x:auto">
      ${st.stats.length===0?`<div class="empty"><div>暂无数值定义</div></div>`:`
      <table class="st">
        <thead><tr><th>名称</th><th>ID</th><th>初始值</th><th>最小</th><th>最大</th><th>玩家可见</th><th></th></tr></thead>
        <tbody>
          ${st.stats.map((s,i)=>`<tr>
            <td><input class="nm" type="text" value="${esc(s.name)}" onblur="S.settings.stats[${i}].name=this.value"></td>
            <td><span style="font-family:var(--mono);font-size:11px;color:var(--t3)">${esc(s.id)}</span></td>
            <td><input type="number" value="${s.initial}" onblur="S.settings.stats[${i}].initial=+this.value"></td>
            <td><input type="number" value="${s.min}" onblur="S.settings.stats[${i}].min=+this.value"></td>
            <td><input type="number" value="${s.max}" onblur="S.settings.stats[${i}].max=+this.value"></td>
            <td style="text-align:center"><input type="checkbox" ${s.visible?'checked':''} onchange="S.settings.stats[${i}].visible=this.checked"></td>
            <td><button class="btn xs del" onclick="delStat(${i})">删除</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;
}
function addTP(){const v=prompt('新时间段名称');if(v&&v.trim()){S.settings.timePeriods.push(v.trim());render();}}
function delTP(i){if(!confirm(`删除时间段"${S.settings.timePeriods[i]}"？`))return;S.settings.timePeriods.splice(i,1);render();}
function addStat(){
  const nm=prompt('数值名称');if(!nm||!nm.trim())return;
  const id=prompt('数值ID（英文）');if(!id||!id.trim())return;
  if(S.settings.stats.find(s=>s.id===id.trim())){toast('该ID已存在','err');return;}
  S.settings.stats.push({id:id.trim(),name:nm.trim(),initial:100,min:0,max:100,visible:true});render();
}
function delStat(i){if(!confirm(`删除数值"${S.settings.stats[i].name}"？`))return;S.settings.stats.splice(i,1);render();}

// ─── 道具管理 ────────────────────────────────
function pgItems(){
  return `
  <div class="ph">
    <div><div class="pt">道具管理</div><div class="ps">定义所有可获取的物品</div></div>
    <div class="pa"><button class="btn" onclick="startAddItem()">+ 新增道具</button></div>
  </div>
  ${U.editItem?itemEP():''}
  ${S.items.length===0&&!U.editItem?`<div class="empty"><div class="empty-ic">🎒</div><div>暂无道具</div></div>`
  :S.items.map((it,i)=>`
    <div class="li">
      <div class="li-info">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="li-name">${esc(it.name)}</span>
          ${it.hasDurability?`<span class="badge" style="background:rgba(85,153,204,.15);color:var(--info);border:1px solid rgba(85,153,204,.3)">有耐久${it.durabilityVisible?'':'·隐藏'}</span>`:''}
        </div>
        <div class="li-id">${esc(it.id)}</div>
        ${it.desc?`<div class="li-sub">${esc(it.desc)}</div>`:''}
      </div>
      <div class="li-act">
        <button class="btn sm" onclick="startEditItem(${i})">编辑</button>
        <button class="btn sm del" onclick="delItem(${i})">删除</button>
      </div>
    </div>`).join('')}`;
}
function itemEP(){
  const it=U.editItem;
  return `
  <div class="ep">
    <div class="ep-t">${it._isNew?'✦ 新增道具':'✦ 编辑道具'}</div>
    <div class="fr"><span class="fl">道具名</span><input type="text" id="it-nm" value="${esc(it.name)}" placeholder="如：应急口粮"></div>
    <div class="fr"><span class="fl">ID</span>
      <input type="text" id="it-id" value="${esc(it.id)}" placeholder="如：item_ration" style="max-width:220px;font-family:var(--mono)" ${it._isNew?'':'disabled'}>
      ${it._isNew?'<span style="font-size:11px;color:var(--t3)">创建后不可修改</span>':''}
    </div>
    <div class="fr" style="align-items:flex-start"><span class="fl" style="margin-top:6px">描述</span>
      <textarea id="it-ds" placeholder="道具外观、背景...">${esc(it.desc)}</textarea></div>
    <div class="fr" style="align-items:flex-start"><span class="fl" style="margin-top:6px">使用效果</span>
      <textarea id="it-ef" style="min-height:50px" placeholder="使用后发生什么（文字描述）">${esc(it.useEffect||'')}</textarea></div>
    <div class="sec">耐久度系统</div>
    <div class="fr">
      <input type="checkbox" id="it-hd" ${it.hasDurability?'checked':''} onchange="U.editItem.hasDurability=this.checked;render()">
      <span style="font-size:13px;color:var(--t1)">启用耐久度</span>
    </div>
    ${it.hasDurability?`
    <div class="fr"><span class="fl">最大耐久</span>
      <input type="number" id="it-md" value="${it.maxDurability||100}" min="1"></div>
    <div class="fr">
      <input type="checkbox" id="it-dv" ${it.durabilityVisible?'checked':''}>
      <span style="font-size:13px;color:var(--t1)">玩家可见耐久值</span>
    </div>`:''}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn sm pri" onclick="saveItem()">保存</button>
      <button class="btn sm" onclick="U.editItem=null;render()">取消</button>
    </div>
  </div>`;
}
function startAddItem(){U.editItem={_isNew:true,id:'',name:'',desc:'',useEffect:'',hasDurability:false,maxDurability:100,durabilityVisible:false};render();setTimeout(()=>document.getElementById('it-nm')?.focus(),0)}
function startEditItem(i){U.editItem={...cloneOf(S.items[i]),_isNew:false,_idx:i};render();}
function saveItem(){
  const nm=document.getElementById('it-nm')?.value.trim();
  const id=document.getElementById('it-id')?.value.trim();
  const ds=document.getElementById('it-ds')?.value.trim();
  const ef=document.getElementById('it-ef')?.value.trim();
  const hd=!!U.editItem.hasDurability;
  const md=hd?+(document.getElementById('it-md')?.value||100):100;
  const dv=hd?!!(document.getElementById('it-dv')?.checked):false;
  if(!nm){toast('请输入道具名','err');return;}
  if(!id){toast('请输入道具ID','err');return;}
  if(U.editItem._isNew&&S.items.find(i=>i.id===id)){toast('ID已存在','err');return;}
  const obj={id,name:nm,desc:ds,useEffect:ef,hasDurability:hd,maxDurability:md,durabilityVisible:dv};
  if(U.editItem._isNew){S.items.push(obj);toast('道具已添加');}
  else{S.items[U.editItem._idx]={...obj,id:U.editItem.id};toast('已保存');}
  U.editItem=null;render();
}
function delItem(i){if(!confirm(`删除道具"${S.items[i].name}"？`))return;S.items.splice(i,1);render();}

// ─── NPC 管理 ────────────────────────────────
function pgNpcs(){
  return `
  <div class="ph">
    <div><div class="pt">NPC 管理</div><div class="ps">定义角色与好感度系统</div></div>
    <div class="pa"><button class="btn" onclick="startAddNpc()">+ 新增 NPC</button></div>
  </div>
  ${U.editNpc?npcEP():''}
  ${S.npcs.length===0&&!U.editNpc?`<div class="empty"><div class="empty-ic">👤</div><div>暂无 NPC</div></div>`
  :S.npcs.map((n,i)=>`
    <div class="li">
      <div class="li-info">
        <div class="li-name">${esc(n.name)}</div>
        <div class="li-id">${esc(n.id)}</div>
        ${n.desc?`<div class="li-sub">${esc(n.desc)}</div>`:''}
      </div>
      <div class="li-act">

function saveLoc(){
  const nm=document.getElementById('lc-nm')?.value.trim();

function delLoc(i){
  if(!confirm(`删除场景"${S.locations[i].name}"？相关事件也会删除。`))return;
  S.events=S.events.filter(e=>e.locationId!==S.locations[i].id);

}

function passEffRow(pe,i){
  const ts=[['stat_per_tick','每时间段数值变化'],['stat_multiplier','数值变化倍率']];
  let fld='';
  if(pe.type==='stat_per_tick'){
    fld=`
      <select onchange="U.editStatus.passiveEffects[${i}].stat=this.value">
        <option value="">选数值...</option>
        ${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${pe.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
      每时间段
      <input type="number" value="${pe.delta||0}" style="width:65px" onblur="U.editStatus.passiveEffects[${i}].delta=+this.value">`;
  }else if(pe.type==='stat_multiplier'){
    fld=`
      <select onchange="U.editStatus.passiveEffects[${i}].stat=this.value">
        <option value="">选数值...</option>
        ${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${pe.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
      的变化量乘以
      <input type="number" value="${pe.multiplier===undefined?1:pe.multiplier}" step="0.1" style="width:65px"
        onblur="U.editStatus.passiveEffects[${i}].multiplier=+this.value">`;
  }
  return`<div class="er">
    <select onchange="chgPassEffType(${i},this.value)">
      ${ts.map(t=>`<option value="${t[0]}" ${pe.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}
    </select>
    ${fld}
    <button class="btn xs del" onclick="U.editStatus.passiveEffects.splice(${i},1);render()">×</button>
  </div>`;
}
function chgPassEffType(i,t){
  const d={stat_per_tick:{type:'stat_per_tick',stat:'',delta:0},stat_multiplier:{type:'stat_multiplier',stat:'',multiplier:1}};
  U.editStatus.passiveEffects[i]=d[t]||{type:t};render();
}
function addPassEff(){U.editStatus.passiveEffects.push({type:'stat_per_tick',stat:'',delta:0});render();}

function simpEffRow(ef,i,phase){
  const ref=`U.editStatus.${phase==='apply'?'onApply':'onRemove'}`;
  const ts=[['stat','数值变化'],['item','道具增减'],['affinity','好感度'],['flag','设置旗标']];
  let fld='';
  if(ef.type==='stat'){
    fld=`
      <select onchange="${ref}[${i}].stat=this.value">
        <option value="">选数值...</option>
        ${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${ef.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.delta||0}" onblur="${ref}[${i}].delta=+this.value">`;
  }else if(ef.type==='item'){
    fld=`
      <select onchange="${ref}[${i}].item=this.value">
        <option value="">选道具...</option>
        ${S.items.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}
      </select>
      <select onchange="${ref}[${i}].action=this.value">
        <option value="add" ${ef.action!=='remove'?'selected':''}>获得</option>
        <option value="remove" ${ef.action==='remove'?'selected':''}>失去</option>
      </select>`;
  }else if(ef.type==='affinity'){
    fld=`
      <select onchange="${ref}[${i}].npc=this.value">
        <option value="">选NPC...</option>
        ${S.npcs.map(n=>`<option value="${esc(n.id)}" ${ef.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.delta||0}" onblur="${ref}[${i}].delta=+this.value">`;
  }else if(ef.type==='flag'){
    fld=`
      <input type="text" value="${esc(ef.flag||'')}" placeholder="flag名称" onblur="${ref}[${i}].flag=this.value">
      <select onchange="${ref}[${i}].value=this.value==='true'">
        <option value="true" ${ef.value!==false?'selected':''}>true</option>
        <option value="false" ${ef.value===false?'selected':''}>false</option>
      </select>`;
  }
  return`<div class="er">
    <select onchange="chgSimpEff('${phase}',${i},this.value)">
      ${ts.map(t=>`<option value="${t[0]}" ${ef.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}
    </select>
    ${fld}
    <button class="btn xs del" onclick="${ref}.splice(${i},1);render()">×</button>
  </div>`;
}
function chgSimpEff(phase,i,t){
  const ref=phase==='apply'?U.editStatus.onApply:U.editStatus.onRemove;
  const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true}};
  ref[i]=d[t]||{type:t};render();
}
function addSimpEff(phase){
  const ref=phase==='apply'?U.editStatus.onApply:U.editStatus.onRemove;
  ref.push({type:'stat',stat:'',delta:0});render();
}
function startAddStatus(){U.editStatus={_isNew:true,id:'',name:'',desc:'',icon:'',color:'#7fba5c',duration:3,stackable:false,passiveEffects:[],onApply:[],onRemove:[]};render();setTimeout(()=>document.getElementById('st-nm')?.focus(),0)}
function startEditStatus(i){U.editStatus={...cloneOf(S.statuses[i]),_isNew:false,_idx:i};render();}

  const nm=document.getElementById('st-nm')?.value.trim();

  const obj={id,name:nm,desc:ds,icon:ic,color:cl,duration:dur,stackable:sk,

    onApply:cloneOf(U.editStatus.onApply||[]),

  if(U.editStatus._isNew){S.statuses.push(obj);toast('状态已添加');}

function delStatus(i){if(!confirm(`删除状态"${S.statuses[i].name}"？`))return;S.statuses.splice(i,1);render();}

  }else if(c.type==='affinity'){
    fld=`
      <select onchange="${ref}.npc=this.value">
        <option value="">选NPC...</option>
        ${S.npcs.map(n=>`<option value="${esc(n.id)}" ${c.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}
      </select>
      <select onchange="${ref}.op=this.value">
        ${['>=','<=','>','<','=='].map(op=>`<option ${c.op===op?'selected':''}>${op}</option>`).join('')}
      </select>
      <input type="number" value="${c.value||0}" onblur="${ref}.value=+this.value">`;

    fld=`
      <select onchange="${ref}.item=this.value">

function chgWxCond(gi,ci,t){

  U.editWeather.tickEffectGroups[gi].conditions[ci]=d[t]||{type:t};render();
}
function addWxCond(gi){U.editWeather.tickEffectGroups[gi].conditions.push({type:'item',item:'',has:true});render();}

function chgWxEff(gi,ei,t){
  const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true},item_durability:{type:'item_durability',item:'',delta:-10}};

function addWxEff(gi){U.editWeather.tickEffectGroups[gi].effects.push({type:'stat',stat:'',delta:0});render();}
function addWxTickGroup(){U.editWeather.tickEffectGroups.push({conditions:[],effects:[]});render();}
function toggleWxTP(tp){if(!U.editWeather)return;const a=U.editWeather.timePeriods;const i=a.indexOf(tp);if(i>=0)a.splice(i,1);else a.push(tp);render();}
function startAddWeather(){U.editWeather={_isNew:true,id:'',name:'',desc:'',icon:'',color:'#9955cc',weight:10,timePeriods:[],tickEffectGroups:[],statusTriggers:[]};render();setTimeout(()=>document.getElementById('wx-nm')?.focus(),0)}
function startEditWeather(i){U.editWeather={...cloneOf(S.weathers[i]),_isNew:false,_idx:i};render();}
function saveWeather(){
  const nm=document.getElementById('wx-nm')?.value.trim();
  const id=document.getElementById('wx-id')?.value.trim();
  const ds=document.getElementById('wx-ds')?.value.trim();
  const ic=document.getElementById('wx-ic')?.value.trim();
  const cl=document.getElementById('wx-cl')?.value;
  const wt=+(document.getElementById('wx-wt')?.value||10);
  if(!nm){toast('请输入天气名称','err');return;}
  if(!id){toast('请输入天气ID','err');return;}
  if(U.editWeather._isNew&&S.weathers.find(w=>w.id===id)){toast('ID已存在','err');return;}
  const obj={id,name:nm,desc:ds,icon:ic,color:cl,weight:wt,
    timePeriods:cloneOf(U.editWeather.timePeriods||[]),
    tickEffectGroups:cloneOf(U.editWeather.tickEffectGroups||[]),
    statusTriggers:cloneOf(U.editWeather.statusTriggers||[])};
  if(U.editWeather._isNew){S.weathers.push(obj);toast('天气已添加');}
  else{S.weathers[U.editWeather._idx]=obj;toast('已保存');}
  U.editWeather=null;render();
}
function delWeather(i){if(!confirm(`删除天气"${S.weathers[i].name}"？`))return;S.weathers.splice(i,1);render();}

    fld=`<select onchange="updCond('${pfx}',${ci},'weatherId',this.value)">
        <option value="">选天气...</option>
        ${S.weathers.map(w=>`<option value="${esc(w.id)}" ${c.weatherId===w.id?'selected':''}>${esc(w.icon||'')} ${esc(w.name)}</option>`).join('')}
      </select>`;
  }
  return`<div class="cr">
    <select onchange="chgCondType('${pfx}',${ci},this.value)">
      ${types.map(t=>`<option value="${t[0]}" ${c.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}
    </select>
    ${fld}
    <button class="btn xs del" onclick="delCond('${pfx}',${ci})">×</button>
  </div>`;
}
function resolveConds(pfx){
  const parts=pfx.split('|');const kind=parts[0];
  if(kind==='E'){const e=evtById(parts.slice(1,-1).join('|'));return e?.conditions;}
  if(kind==='C'){const ci=+parts[parts.length-1];const e=evtById(parts.slice(1,-1).join('|'));return e?.choices[ci]?.conditions;}
  return null;
}
function addCond(evtId,kind,choiceIdx){
  const arr=resolveConds(`${kind}|${evtId}|${choiceIdx}`);
  if(!arr)return;arr.push({type:'flag',flag:'',is:true});render();
}
function chgCondType(pfx,ci,t){
  const arr=resolveConds(pfx);if(!arr)return;
  const d={flag:{type:'flag',flag:'',is:true},stat:{type:'stat',stat:'',op:'>=',value:0},affinity:{type:'affinity',npc:'',op:'>=',value:0},item:{type:'item',item:'',has:true},status:{type:'status',statusId:'',has:true},weather:{type:'weather',weatherId:''}};
  arr[ci]=d[t]||{type:t};render();
}
function updCond(pfx,ci,field,val){const arr=resolveConds(pfx);if(!arr)return;arr[ci][field]=val;}
function delCond(pfx,ci){const arr=resolveConds(pfx);if(!arr)return;arr.splice(ci,1);render();}

// ─── 段落 ───────────────────────────────────
function paraBlock(evtId,p,pi,total){
  return`<div class="pb">
    <div class="pb-h">
      <select onchange="updPara('${evtId}',${pi},'type',this.value);render()">
        <option value="narrate" ${p.type==='narrate'?'selected':''}>叙述</option>
        <option value="dialogue" ${p.type==='dialogue'?'selected':''}>对话</option>
        <option value="monologue" ${p.type==='monologue'?'selected':''}>内心独白</option>
        <option value="system" ${p.type==='system'?'selected':''}>系统提示</option>
      </select>
      ${p.type==='dialogue'?`<select onchange="updPara('${evtId}',${pi},'speaker',this.value)">
        <option value="">说话者...</option>
        ${S.npcs.map(n=>`<option value="${esc(n.id)}" ${p.speaker===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}
        <option value="__player__" ${p.speaker==='__player__'?'selected':''}>玩家</option>
      </select>`:''}
      <div style="flex:1"></div>
      <button class="btn xs ghost" onclick="movePara('${evtId}',${pi},-1)" ${pi===0?'disabled':''}>↑</button>
      <button class="btn xs ghost" onclick="movePara('${evtId}',${pi},1)" ${pi===total-1?'disabled':''}>↓</button>
      <button class="btn xs del" onclick="delPara('${evtId}',${pi})">×</button>
    </div>
    <div class="pb-b">
      <textarea placeholder="${p.type==='dialogue'?'对话内容...':p.type==='monologue'?'内心独白...':p.type==='system'?'系统提示...':'叙述文字...'}"
        onblur="updPara('${evtId}',${pi},'text',this.value)">${esc(p.text||'')}</textarea>
    </div>
  </div>`;
}
function addPara(evtId){const e=evtById(evtId);if(!e)return;e.paragraphs.push({type:'narrate',text:''});render();}
function delPara(evtId,pi){const e=evtById(evtId);if(!e)return;e.paragraphs.splice(pi,1);render();}
function movePara(evtId,pi,d){const e=evtById(evtId);if(!e)return;const a=e.paragraphs,ni=pi+d;if(ni<0||ni>=a.length)return;[a[pi],a[ni]]=[a[ni],a[pi]];render();}
function updPara(evtId,pi,field,val){const e=evtById(evtId);if(!e)return;e.paragraphs[pi][field]=val;}

// ─── 选项 ───────────────────────────────────
function choiceBlock(evtId,ch,ci){
  const key=`${evtId}_${ci}`;const open=!!U.openChoices[key];
  return`<div class="cb">
    <div class="cb-h" onclick="toggleChoice('${evtId}',${ci})">
      <span class="cb-num">选项 ${ci+1}</span>
      <span class="cb-prev">${esc(ch.text||'（未填写）')}</span>
      <div style="display:flex;gap:5px;margin-left:auto" onclick="event.stopPropagation()">
        <button class="btn xs del" onclick="delChoice('${evtId}',${ci})">×</button>
      </div>
      <span style="color:var(--t3);font-size:11px;margin-left:8px">${open?'▲':'▼'}</span>
    </div>
    <div class="cb-b${open?' open':''}">
      <div class="fr"><span class="fl">选项文字</span>
        <input type="text" value="${esc(ch.text||'')}" placeholder="玩家看到的选项..."
          onblur="evtById('${evtId}').choices[${ci}].text=this.value"></div>
      <div class="sec">显示条件</div>
      ${(ch.conditions||[]).length===0?`<div style="color:var(--t3);font-size:12px;margin-bottom:6px">无条件（始终显示）</div>`:''}
      ${(ch.conditions||[]).map((c,cdi)=>condRow(c,cdi,'C',evtId,ci)).join('')}
      <button class="btn xs" onclick="addCond('${evtId}','C',${ci})">+ 显示条件</button>
      <div class="sec">执行效果</div>
      ${(ch.effects||[]).length===0?`<div style="color:var(--t3);font-size:12px;margin-bottom:6px">无效果</div>`:''}
      ${(ch.effects||[]).map((ef,ei)=>effRow(ef,ei,evtId,ci)).join('')}
      <button class="btn xs" onclick="addEff('${evtId}',${ci})">+ 添加效果</button>
      <div class="sec">跳转目标</div>
      <div class="fr"><span class="fl">跳转到</span>
        <select onchange="evtById('${evtId}').choices[${ci}].next=this.value||null">
          <option value="" ${!ch.next?'selected':''}>返回场景主界面</option>
          <optgroup label="── 当前场景 ──">
            ${evtsOfLoc(U.locId).filter(ev=>ev.id!==evtId).map(ev=>`<option value="${esc(ev.id)}" ${ch.next===ev.id?'selected':''}>${esc(ev.name)}</option>`).join('')}
          </optgroup>
          ${S.locations.filter(l=>l.id!==U.locId).map(l=>{
            const evs=evtsOfLoc(l.id);if(!evs.length)return'';
            return`<optgroup label="── ${esc(l.name)} ──">${evs.map(ev=>`<option value="${esc(ev.id)}" ${ch.next===ev.id?'selected':''}>${esc(ev.name)}</option>`).join('')}</optgroup>`;
          }).join('')}
        </select>
      </div>
    </div>
  </div>`;
}
function toggleChoice(evtId,ci){const k=`${evtId}_${ci}`;U.openChoices[k]=!U.openChoices[k];render();}
function addChoice(evtId){const e=evtById(evtId);if(!e)return;e.choices.push({text:'',conditions:[],effects:[],next:null});U.openChoices[`${evtId}_${e.choices.length-1}`]=true;render();}
function delChoice(evtId,ci){const e=evtById(evtId);if(!e)return;e.choices.splice(ci,1);render();}

// ─── 选项效果 ────────────────────────────────
function effRow(ef,ei,evtId,ci){
  const types=[['stat','数值变化'],['item','道具增减'],['affinity','好感度变化'],['flag','设置旗标'],['time','消耗时间'],['add_status','添加状态'],['remove_status','移除状态'],['item_durability','消耗道具耐久']];
  let fld='';
  if(ef.type==='stat'){
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'stat',this.value)">
        <option value="">选数值...</option>
        ${S.settings.stats.map(s=>`<option value="${esc(s.id)}" ${ef.stat===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.delta||0}" onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;
  }else if(ef.type==='item'){
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'item',this.value)">
        <option value="">选道具...</option>
        ${S.items.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}
      </select>
      <select onchange="updEff('${evtId}',${ci},${ei},'action',this.value)">
        <option value="add" ${ef.action!=='remove'?'selected':''}>获得</option>
        <option value="remove" ${ef.action==='remove'?'selected':''}>失去</option>
      </select>`;
  }else if(ef.type==='affinity'){
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'npc',this.value)">
        <option value="">选NPC...</option>
        ${S.npcs.map(n=>`<option value="${esc(n.id)}" ${ef.npc===n.id?'selected':''}>${esc(n.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.delta||0}" onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;
  }else if(ef.type==='flag'){
    fld=`<input type="text" value="${esc(ef.flag||'')}" placeholder="flag名称" onblur="updEff('${evtId}',${ci},${ei},'flag',this.value)">
      <select onchange="updEff('${evtId}',${ci},${ei},'value',this.value==='true')">
        <option value="true" ${ef.value!==false?'selected':''}>设为 true</option>
        <option value="false" ${ef.value===false?'selected':''}>设为 false</option>
      </select>`;
  }else if(ef.type==='time'){
    fld=`<input type="number" value="${ef.cost||1}" min="1" max="6" style="width:58px"
        onblur="updEff('${evtId}',${ci},${ei},'cost',+this.value)">
      <span style="font-size:12px;color:var(--t2)">个时间段</span>`;
  }else if(ef.type==='add_status'){
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'statusId',this.value)">
        <option value="">选状态...</option>
        ${S.statuses.map(s=>`<option value="${esc(s.id)}" ${ef.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.duration===undefined?-1:ef.duration}" style="width:65px" title="持续时间段（-1=使用状态自带时长）"
        onblur="updEff('${evtId}',${ci},${ei},'duration',+this.value)">
      <span style="font-size:11px;color:var(--t3)">时间段(-1=默认)</span>`;
  }else if(ef.type==='remove_status'){
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'statusId',this.value)">
        <option value="">选状态...</option>
        ${S.statuses.map(s=>`<option value="${esc(s.id)}" ${ef.statusId===s.id?'selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('')}
      </select>`;
  }else if(ef.type==='item_durability'){
    const durItems=S.items.filter(it=>it.hasDurability);
    fld=`<select onchange="updEff('${evtId}',${ci},${ei},'item',this.value)">
        <option value="">${durItems.length===0?'（先为道具启用耐久）':'选道具...'}</option>
        ${durItems.map(it=>`<option value="${esc(it.id)}" ${ef.item===it.id?'selected':''}>${esc(it.name)}</option>`).join('')}
      </select>
      <input type="number" value="${ef.delta||0}" placeholder="变化量（负=消耗）"
        onblur="updEff('${evtId}',${ci},${ei},'delta',+this.value)">`;
  }
  return`<div class="er">
    <select onchange="chgEffType('${evtId}',${ci},${ei},this.value)">
      ${types.map(t=>`<option value="${t[0]}" ${ef.type===t[0]?'selected':''}>${t[1]}</option>`).join('')}
    </select>
    ${fld}
    <button class="btn xs del" onclick="delEff('${evtId}',${ci},${ei})">×</button>
  </div>`;
}
function addEff(evtId,ci){const e=evtById(evtId);if(!e)return;e.choices[ci].effects.push({type:'stat',stat:'',delta:0});render();}
function delEff(evtId,ci,ei){const e=evtById(evtId);if(!e)return;e.choices[ci].effects.splice(ei,1);render();}
function updEff(evtId,ci,ei,field,val){const e=evtById(evtId);if(!e)return;e.choices[ci].effects[ei][field]=val;}
function chgEffType(evtId,ci,ei,t){
  const e=evtById(evtId);if(!e)return;
  const d={stat:{type:'stat',stat:'',delta:0},item:{type:'item',item:'',action:'add'},affinity:{type:'affinity',npc:'',delta:0},flag:{type:'flag',flag:'',value:true},time:{type:'time',cost:1},add_status:{type:'add_status',statusId:'',duration:-1},remove_status:{type:'remove_status',statusId:''},item_durability:{type:'item_durability',item:'',delta:-10}};
  e.choices[ci].effects[ei]=d[t]||{type:t};render();
}

// ─── 导出 / 导入 ────────────────────────────
function pgExport(){
  const stats={场景:S.locations.length,事件:S.events.length,'NPC':S.npcs.length,道具:S.items.length,状态:S.statuses.length,天气:S.weathers.length};
  return`
  <div class="ph"><div><div class="pt">导出 / 导入</div><div class="ps">保存剧情数据或从文件加载</div></div></div>
  <div class="card">
    <div class="card-h">导出数据</div>
    <div class="card-b">
      <p style="color:var(--t2);font-size:13px;margin-bottom:12px">将所有设定（含状态、天气）导出为 JSON，可随时导入继续编辑，也用作游戏引擎数据源。</p>
      <button class="btn pri" onclick="exportJSON()">⬇ 导出 story.json</button>
    </div>
  </div>
  <div class="card">
    <div class="card-h">导入数据</div>
    <div class="card-b">
      <p style="color:var(--t2);font-size:13px;margin-bottom:12px">⚠ 导入会覆盖当前全部数据，请先导出备份。</p>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="importClick()">⬆ 从文件导入</button>
        <button class="btn" onclick="document.getElementById('paste-wrap').style.display='block'">📋 粘贴 JSON</button>
      </div>
      <div id="paste-wrap" style="display:none;margin-top:12px">
        <textarea id="paste-json" style="font-family:var(--mono);font-size:12px;min-height:180px;color:var(--acc2)" placeholder="粘贴 JSON 内容..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn sm pri" onclick="importPaste()">导入</button>
          <button class="btn sm" onclick="document.getElementById('paste-wrap').style.display='none'">取消</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-h">当前数据概览</div>
    <div class="card-b">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${Object.entries(stats).map(([k,v])=>`
          <div style="background:var(--s2);border:1px solid var(--b1);border-radius:3px;padding:12px;text-align:center">
            <div style="font-size:24px;font-family:var(--mono);color:var(--acc)">${v}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:2px">${k}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`${S.meta.title||'story'}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);toast('已导出 JSON');
}
function importClick(){document.getElementById('file-input').click();}
function handleFileImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{applyImport(JSON.parse(e.target.result));}catch{toast('JSON 解析失败','err');}};
  r.readAsText(f);ev.target.value='';
}
function importPaste(){try{applyImport(JSON.parse(document.getElementById('paste-json')?.value));}catch{toast('JSON 格式错误','err');}}
function applyImport(data){
  if(!data?.meta||!data?.settings){toast('数据格式不正确','err');return;}
  if(!data.statuses)data.statuses=[];
  if(!data.weathers)data.weathers=[];
  S=data;
  U={tab:'global',evtView:'locs',locId:null,evtId:null,openChoices:{},editItem:null,editNpc:null,editLoc:null,editStatus:null,editWeather:null};
  render();toast('导入成功！','info');
}

// ─── 启动 ────────────────────────────────────
render();
</script>
</body>
</html>
